<div class="container animate-fade-in">
  <div class="glass card">
    <h2>Add New Expense</h2>
    <form [formGroup]="expenseForm" (ngSubmit)="onSubmit()" class="margin-top-2">
      <div class="form-grid">
        <div class="form-group">
          <label>Description</label>
          <input type="text" formControlName="description" placeholder="What was it for?">
        </div>
        <div class="form-group">
          <label>Amount (Rs.)</label>
          <input type="number" formControlName="amount" placeholder="0.00" step="0.01">
        </div>
      </div>

      <div class="form-grid margin-top-1">
        <div class="form-group">
          <label>Paid By</label>
          <select formControlName="payerId">
            <option value="" disabled selected>Select Payer</option>
            <option *ngFor="let user of users$ | async" [value]="user.id">{{ user.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Split Type</label>
          <select formControlName="splitType" (change)="onSplitTypeChange()">
            <option value="EQUAL">Equally</option>
            <option value="EXACT">Exact Amounts</option>
            <option value="PERCENT">Percentages</option>
          </select>
        </div>
      </div>

      <div class="margin-top-2">
        <h4>Split with</h4>
        <div class="sharer-list margin-top-1">
          <div *ngFor="let user of users$ | async; let i = index" class="sharer-item glass">
            <div class="sharer-info">
              <input type="checkbox" [checked]="isUserSelected(user.id)" (change)="toggleUserSelection(user.id)" style="width: auto; margin-right: 10px;">
              <span>{{ user.name }}</span>
            </div>
            
            <div class="sharer-input" *ngIf="isUserSelected(user.id)">
              <div *ngIf="expenseForm.get('splitType')?.value === 'EXACT'">
                <input type="number" [placeholder]="'Amount'" (input)="updateShareValue(user.id, $event, 'amount')" [value]="getShareValue(user.id, 'amount')">
              </div>
              <div *ngIf="expenseForm.get('splitType')?.value === 'PERCENT'">
                <input type="number" [placeholder]="'Percent %'" (input)="updateShareValue(user.id, $event, 'percent')" [value]="getShareValue(user.id, 'percent')">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="error-message margin-top-1" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="actions margin-top-2">
        <button type="button" class="btn-secondary" routerLink="/" style="margin-right: 1rem;">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="expenseForm.invalid || selectedUserIds.length === 0">Add Expense</button>
      </div>
    </form>
  </div>
</div>
